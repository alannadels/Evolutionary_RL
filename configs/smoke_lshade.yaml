env:
  id: "MiniGrid-DoorKey-6x6-v0"
  fully_observable: true

ppo:
  learning_rate: 3.0e-4
  n_steps: 512
  batch_size: 64
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 1024
  policy: "MlpPolicy"

evolution:
  algo: "lshade"
  K: 5
  population_size: 4
  max_generations: 2
  n_seeds_per_eval: 1
  lshade:
    H: 6

evaluation:
  n_eval_episodes: 3
  eval_seed: 123

seeds:
  training_base: 42
  n_experiment_seeds: 1

output_dir: "results/smoke_test/lshade"
