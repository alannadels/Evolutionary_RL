env:
  id: "MiniGrid-KeyCorridorS3R1-v0"
  fully_observable: true

ppo:
  learning_rate: 3.0e-4
  n_steps: 512
  batch_size: 64
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 500000
  policy: "MlpPolicy"

evolution:
  algo: "xnes"
  K: 5
  population_size: 12
  max_generations: 15
  n_seeds_per_eval: 1
  xnes:
    sigma0: 2.0

evaluation:
  n_eval_episodes: 50
  eval_seed: 123

seeds:
  training_base: 42
  n_experiment_seeds: 10

output_dir: "results/keycorridor/xnes"
